version: '3.8'

services:
  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./server:/app
    command: sh -c "npm install && npm start"
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_ANTHROPIC_API_KEY=${VITE_ANTHROPIC_API_KEY}
    depends_on:
      - backend
